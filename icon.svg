<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="coralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9B8A"/>
      <stop offset="100%" stop-color="#FF7F6A"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EBC08F"/>
      <stop offset="100%" stop-color="#D6A56F"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF7F1"/>
      <stop offset="100%" stop-color="#F2E5DC"/>
    </linearGradient>
    
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#3B2521" flood-opacity="0.12" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  <rect width="480" height="480" x="16" y="16" rx="112" fill="none" stroke="#FF7F6A" stroke-width="4" stroke-opacity="0.2"/>

  <!-- Logo Group -->
  <g filter="url(#shadow)">
    <!-- Main Cargo/Shipping Box Shape -->
    <path d="M256,120 L390,190 L390,330 L256,400 L122,330 L122,190 Z" fill="#3B2521" />
    
    <!-- Top Face of the Box (Dusty Rose) -->
    <path d="M256,120 L390,190 L256,260 L122,190 Z" fill="#B67C8A" />
    
    <!-- Left Face of the Box (Nude Gold Gradient) -->
    <path d="M122,190 L256,260 L256,400 L122,330 Z" fill="url(#goldGrad)" />
    
    <!-- Right Face of the Box (Coral Gradient) -->
    <path d="M256,260 L390,190 L390,330 L256,400 Z" fill="url(#coralGrad)" />
    
    <!-- Upward arrow representing growth / profit -->
    <path d="M220,330 L256,290 L292,330" fill="none" stroke="#FFF7F1" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M256,290 L256,370" fill="none" stroke="#FFF7F1" stroke-width="12" stroke-linecap="round" />
    
    <!-- Percent Sign details on top face -->
    <circle cx="230" cy="180" r="10" fill="#FFF7F1" />
    <circle cx="282" cy="200" r="10" fill="#FFF7F1" />
    <line x1="292" y1="175" x2="220" y2="205" stroke="#FFF7F1" stroke-width="8" stroke-linecap="round" />
  </g>
</svg>
